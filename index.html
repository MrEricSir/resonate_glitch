}

// ── COLOR HELPERS ────────────────────────────────────────────────────────────
function rgbHue(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b), d = mx - mn;
  if (!d) return 0;
  let h;
  if      (mx === r) h = ((g - b) / d) % 6;
  else if (mx === g) h = (b - r) / d + 2;
  else               h = (r - g) / d + 4;
  return (h * 60 + 360) % 360;
}

function rgbSat(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
  if (mx === mn) return 0;
  const l = (mx + mn) / 2;
  return (mx - mn) / (1 - Math.abs(2 * l - 1));
}

// ── FRAME ANALYSIS ───────────────────────────────────────────────────────────
function analyzeFrame() {
  // Downsample the display canvas (post-effect) into the small analysis canvas
  actx.drawImage(canvas, 0, 0, AW, AH);
  const { data: px } = actx.getImageData(0, 0, AW, AH);

  // Polar grid: 4 rings × 4 sectors = 16 cells (ring * 4 + sector).
  // Rings radiate from center outward; sectors are quadrants clockwise from top.
  const acx = AW / 2, acy = AH / 2;
  const aMaxR = Math.hypot(acx, acy);

  // Per-cell accumulators
  const cBr = new Float32Array(16); // brightness sum
  const cHu = new Float32Array(16); // hue sum (saturated pixels only)
  const cMo = new Float32Array(16); // motion sum
  const cN  = new Float32Array(16); // pixel count
  const cHN = new Float32Array(16); // saturated pixel count (for hue avg)
  // 12-bucket hue histogram (30 deg each) for dominant hue detection
  const hHist = new Float32Array(12);

  let totBr = 0, totMot = 0, totN = 0, satSum = 0, satN = 0;

  for (let y = 0; y < AH; y++) {
    for (let x = 0; x < AW; x++) {
      const i   = (y * AW + x) * 4;
      const r   = px[i], g = px[i+1], b = px[i+2];

      // Map pixel to polar cell
      const dx = x - acx, dy = y - acy;
      const ringIdx   = Math.min((Math.sqrt(dx * dx + dy * dy) / aMaxR * GRID) | 0, GRID - 1);
      const angle     = (Math.atan2(dy, dx) + Math.PI * 2.5) % (Math.PI * 2); // 0 at top, CW
      const sectorIdx = Math.min((angle / (Math.PI * 2) * GRID) | 0, GRID - 1);
      const ci = ringIdx * GRID + sectorIdx;

      const br  = (r + g + b) / 3;
      grayBuf[y * AW + x] = br;  // kept for texture analysis pass

      cBr[ci] += br; cN[ci]++;
      totBr += br;   totN++;

      // Only count saturated pixels toward hue (grays are uninformative)
      const sat = rgbSat(r, g, b);
      if (sat > 0.2) {
        const h = rgbHue(r, g, b);
        cHu[ci] += h; cHN[ci]++;
        hHist[(h / 30) | 0]++;
        satSum += sat; satN++;
      }

      // Frame diff for motion
      if (prevPx) {
        const d = (Math.abs(r - prevPx[i]) +
                   Math.abs(g - prevPx[i+1]) +
                   Math.abs(b - prevPx[i+2])) / 3;
        cMo[ci] += d; totMot += d;
      }
    }
  }

  // Swap double buffer (copy current pixels without new allocation)
  currBuf.set(px);
  prevPx  = currBuf;
  currBuf = currBuf === bufA ? bufB : bufA;

  // Normalize accumulators into state
  for (let c = 0; c < 16; c++) {
    const n = cN[c] || 1;
    S.cellBright[c] = cBr[c] / n;
    S.cellMotion[c] = cMo[c] / n;
    // Fall back to scene dominant hue for desaturated cells
    S.cellHue[c] = cHN[c] > 0 ? cHu[c] / cHN[c] : S.domHue;
  }
  S.totalMotion = totMot / (totN || 1);

  // Dominant hue: find peak bucket, smooth with EMA
  let mxBk = 0, mxV = 0;
  for (let i = 0; i < 12; i++) if (hHist[i] > mxV) { mxV = hHist[i]; mxBk = i; }
  S.domHue = S.domHue * 0.93 + (mxBk * 30 + 15) * 0.07;
  S.avgSat = satN > 0 ? satSum / satN : 0;

  // ── Chord selection ────────────────────────────────────────────────────────
  // Candidate updates every frame; chord commits only when stable for ~3s OR
  // a motion spike is detected (scene cut / big gesture).
  const candidate = pickChord(S.domHue, S.overallBright, S.avgSat);
  if (candidate !== S.chordCandidate) {
    S.chordCandidate   = candidate;
    S.chordStableCount = 0;
  } else {
    S.chordStableCount = Math.min(S.chordStableCount + 1, 120);
  }

  // Motion spike = totalMotion is 2.5× the recent smoothed average (and non-trivial)
  const motionSpike = S.smoothMotion > 2 && S.totalMotion > S.smoothMotion * 2.5;
  S.smoothMotion = S.smoothMotion * 0.92 + S.totalMotion * 0.08;

  const chordChanged = candidate !== S.chordName;
  if (chordChanged && (motionSpike || S.chordStableCount >= 90)) {
    S.chordName = candidate;
    S.arpNotes  = buildArpNotes(candidate);
  }
  if (motionSpike) {
    // Scene change → new arpeggio pattern (pick any except the current one)
    S.arpPatternIdx = (S.arpPatternIdx + 1 + Math.floor(Math.random() * (ARP_PATTERNS.length - 1))) % ARP_PATTERNS.length;
  }

  // Derive melody scale from chord so they're always harmonically coherent
  S.scaleName = chordToScale(S.chordName);

  // 16-step brightness profile from polar cells in sweep order
  // (step 0 = ring 0 sector 0 … step 15 = ring 3 sector 3).
  let sMean = 0;
  for (let s = 0; s < STEPS; s++) {
    S.stripBright[s] = S.cellBright[s];
    sMean += S.stripBright[s];
  }
  S.stripMean = sMean / STEPS;
  let sVar = 0;
  for (let s = 0; s < STEPS; s++) sVar += (S.stripBright[s] - S.stripMean) ** 2;
  S.stripStd = Math.sqrt(sVar / STEPS) || 1; // never zero

  // Overall brightness drives tempo for everything (drums + melody stay in sync)
  const overBr = totBr / (totN || 1);
  S.overallBright = overBr;
  const tCurve = (overBr / 255) ** 2; // quad-in: leans toward lower BPM in normal light
  S.bpm = S.bpm * 0.96 + (BPM_LO + tCurve * (BPM_HI - BPM_LO)) * 0.04;
  Tone.Transport.bpm.value = S.bpm;

  // Brightness spike detection → drum fill
  // A "burst of light" is when brightness jumps well above its recent smoothed average.
  // Gate: at least one measure (or 1.5s, whichever is longer) must pass between fills.
  const brightDelta = S.overallBright - S.smoothBright;
  S.smoothBright = S.smoothBright * 0.88 + S.overallBright * 0.12;
  const measureSecs = 4 * 60 / Math.max(S.bpm, 1);
  if (brightDelta > 25 && (Tone.Transport.seconds - S.lastFillTime) > Math.max(measureSecs, 1.5)) {
    S.triggerFill  = true;
    S.lastFillTime = Tone.Transport.seconds;
  }

  // ── Beat style selection ───────────────────────────────────────────────────
  const tNow = Math.max(0, Math.min(1, (S.bpm - BPM_LO) / (BPM_HI - BPM_LO)));
  const beatCand = pickBeatStyle(tNow, S.totalMotion, S.domHue, S.avgSat);
  if (beatCand !== S.beatCandidate) {
    S.beatCandidate   = beatCand;
    S.beatStableCount = 0;
  } else {
    S.beatStableCount = Math.min(S.beatStableCount + 1, 60);
  }
  // Queue style change at next bar boundary after ~2s stability (~50 frames @ 30fps)
  if (S.beatStableCount >= 50 && beatCand !== S.beatStyle) {
    S.pendingBeatStyle = beatCand;
  }

  // ── Bass filter mode ───────────────────────────────────────────────────────
  if (bFilt) updateBassMode(tNow, S.domHue, S.avgSat);

  // ── Texture analysis (every 5 frames — ~6 updates/sec at 30fps) ────────────
  analyzeFrameCount++;
  if (analyzeFrameCount % 10 === 0) computeTextureFeatures(px);
}

// ── TEXTURE ANALYSIS ─────────────────────────────────────────────────────────
// Called every 10 frames. Reads grayBuf (filled in the main loop) and px (RGBA).
// Fills S.tex* fields consumed by the sequencer and pickBeatStyle.

// LBP clockwise neighbor offsets (right → up-right → up → ... → down-right)
const LBP_DX = [ 1, 1, 0,-1,-1,-1, 0, 1];
const LBP_DY = [ 0,-1,-1,-1, 0, 1, 1, 1];

function computeTextureFeatures(px) {
  const W = AW, H = AH;

  // ── 1. Sobel → edge density, direction entropy (geometric), run-length ─────
  const dirBins = new Float32Array(8); // 45°-wide orientation bins
  const EDGE_THRESH = 18;
  let edgePx = 0, totalPx = 0;
  let runSum = 0, runCount = 0, currentRun = 0;

  for (let y = 1; y < H - 1; y++) {
    currentRun = 0;
    for (let x = 1; x < W - 1; x++) {
      const gx =
        -grayBuf[(y-1)*W+(x-1)] - 2*grayBuf[y*W+(x-1)] - grayBuf[(y+1)*W+(x-1)]
        +grayBuf[(y-1)*W+(x+1)] + 2*grayBuf[y*W+(x+1)] + grayBuf[(y+1)*W+(x+1)];
      const gy =
        -grayBuf[(y-1)*W+(x-1)] - 2*grayBuf[(y-1)*W+x] - grayBuf[(y-1)*W+(x+1)]
        +grayBuf[(y+1)*W+(x-1)] + 2*grayBuf[(y+1)*W+x] + grayBuf[(y+1)*W+(x+1)];
      const mag = Math.sqrt(gx * gx + gy * gy);
      totalPx++;
      if (mag > EDGE_THRESH) {
        edgePx++;
        dirBins[Math.floor(((Math.atan2(gy, gx) + Math.PI) / (2 * Math.PI)) * 8) % 8] += mag;
        currentRun++;
      } else {
        if (currentRun > 1) { runSum += currentRun; runCount++; }
        currentRun = 0;
      }
    }
    if (currentRun > 1) { runSum += currentRun; runCount++; }
  }

  const rawEdgeDensity = totalPx > 0 ? edgePx / totalPx : 0;

  // Direction entropy: 0 = single dominant angle (geometric), 3.0 = all equal (organic)
  let dirTotal = 0;
  for (let i = 0; i < 8; i++) dirTotal += dirBins[i];
  let entropy = 0;
  if (dirTotal > 0) {
    for (let i = 0; i < 8; i++) {
      if (dirBins[i] > 0) { const p = dirBins[i] / dirTotal; entropy -= p * Math.log2(p); }
    }
  }
  // Geometric = low entropy + some edges present (flat image has no edges to be geometric)
  const rawGeometric = rawEdgeDensity > 0.02 ? Math.max(0, 1 - entropy / 3.0) : 0;
  // Mean run-length: longer straight runs → more linear/architectural
  const rawLinearity = runCount > 0 ? Math.min((runSum / runCount) / 15, 1) : 0;

  // ── 2. Local Binary Patterns → texture complexity ──────────────────────────
  let uniformCount = 0, lbpTotal = 0;
  for (let y = 1; y < H - 1; y++) {
    for (let x = 1; x < W - 1; x++) {
      const c = grayBuf[y * W + x];
      let code = 0;
      for (let k = 0; k < 8; k++) {
        if (grayBuf[(y + LBP_DY[k]) * W + (x + LBP_DX[k])] >= c) code |= (1 << k);
      }
      let transitions = 0;
      for (let k = 0; k < 8; k++) {
        if (((code >> k) & 1) !== ((code >> ((k + 1) % 8)) & 1)) transitions++;
      }
      if (transitions <= 2) uniformCount++; // uniform = smooth/structured local region
      lbpTotal++;
    }
  }
  // High non-uniformity = complex organic texture
  const rawComplexity = lbpTotal > 0 ? 1 - (uniformCount / lbpTotal) : 0;

  // ── 3. Row autocorrelation → periodicity ──────────────────────────────────
  let maxCorr = 0;
  for (const row of [H >> 2, H >> 1, (3 * H) >> 2]) {
    const base = row * W;
    let mean = 0;
    for (let x = 0; x < W; x++) mean += grayBuf[base + x];
    mean /= W;
    let variance = 0;
    for (let x = 0; x < W; x++) variance += (grayBuf[base + x] - mean) ** 2;
    variance /= W;
    if (variance < 10) continue;
    for (const lag of [4, 8, 16, 24, 32]) {
      let corr = 0;
      const n = W - lag;
      for (let x = lag; x < W; x++) corr += (grayBuf[base + x] - mean) * (grayBuf[base + x - lag] - mean);
      maxCorr = Math.max(maxCorr, Math.max(0, corr / (n * variance)));
    }
  }
  const rawPeriodic = Math.min(maxCorr, 1);

  // ── 4. Local 4×4 block variance → fine-texture measure ────────────────────
  let localVarSum = 0, localVarN = 0;
  for (let by = 0; by + 4 <= H; by += 4) {
    for (let bx = 0; bx + 4 <= W; bx += 4) {
      let s = 0, s2 = 0;
      for (let dy = 0; dy < 4; dy++) for (let dx = 0; dx < 4; dx++) {
        const v = grayBuf[(by + dy) * W + (bx + dx)];
        s += v; s2 += v * v;
      }
      localVarSum += s2 / 16 - (s / 16) ** 2;
      localVarN++;
    }
  }
  const rawFine = localVarN > 0 ? Math.min(localVarSum / localVarN / 800, 1) : 0;

  // ── 5. Hue cluster count → color complexity ────────────────────────────────
  const hueBuckets = new Uint16Array(12);
  for (let y = 0; y < H; y += 2) {
    for (let x = 0; x < W; x += 2) {
      const i = (y * W + x) * 4;
      const r = px[i], g = px[i+1], b = px[i+2];
      const mx = Math.max(r,g,b), mn = Math.min(r,g,b);
      if (mx < 30 || mx === mn) continue;
      const l = (mx + mn) / 510;
      if ((mx - mn) / 255 / (1 - Math.abs(2*l - 1)) < 0.25) continue;
      hueBuckets[(rgbHue(r, g, b) / 30) | 0]++;
    }
  }
  const minPx = (W * H / 4) * 0.025;
  const rawClusters = hueBuckets.reduce((n, b) => n + (b > minPx ? 1 : 0), 0);

  // ── EMA smoothing → S ──────────────────────────────────────────────────────
  const A = 0.15;
  S.texGeometric    = S.texGeometric    * (1-A) + rawGeometric    * A;
  S.texComplexity   = S.texComplexity   * (1-A) + rawComplexity   * A;
  S.texPeriodic     = S.texPeriodic     * (1-A) + rawPeriodic     * A;
  S.texEdgeDensity  = S.texEdgeDensity  * (1-A) + rawEdgeDensity  * A;
  S.texFine         = S.texFine         * (1-A) + rawFine         * A;
  S.texLinearity    = S.texLinearity    * (1-A) + rawLinearity     * A;
  S.texColorClusters = Math.round(S.texColorClusters * 0.8 + rawClusters * 0.2);
}

// Derive a human-readable texture label from the current S.tex* signals
function textureLabel() {
  const { texEdgeDensity: e, texPeriodic: p, texGeometric: g,
          texComplexity: c, texFine: f, texLinearity: l } = S;
  if (e < 0.03)              return 'SMOOTH';
  if (p > 0.60)              return 'PERIODIC';
  if (g > 0.58 && l > 0.38) return 'GEOMETRIC';
  if (c > 0.65 && f > 0.42) return 'ORGANIC';
  if (f > 0.58)              return 'TEXTURED';
  if (c > 0.58)              return 'COMPLEX';
  return 'MIXED';
}

// ── AUDIO SETUP ──────────────────────────────────────────────────────────────
let melody, bass, kick, hihat, snare;
let bFilt, bassDelay, bassDistort, bassChorus, technoPhaser;
let reverb, hallReverb, ppDelay, melodyChorus, melodyVibrato;
let ambientAutoFilter;
let organ, woodwind, ambientPad, ambientTremolo;
let ambientBassNote, ambientSparkle;
let masterComp, ambientDryGain, drumBus;
let currentBassMode = '';
let currentGenre = 'techno';
let melodyNote = '4n'; // current melody subdivision (for HUD)

// ── SONG STRUCTURE ───────────────────────────────────────────────────────────
// Four cycling "parts" that modulate intensity across the whole piece.
// vel  = velocity multiplier (0–1) applied to all note triggers
// gate = gate-open probability multiplier applied to melody/sparse events
const SONG_PARTS = [
  { name: 'intro', measures: 8,  vel: 0.40, gate: 0.30 },
  { name: 'build', measures: 12, vel: 0.70, gate: 0.65 },
  { name: 'peak',  measures: 16, vel: 1.00, gate: 1.00 },
  { name: 'break', measures: 8,  vel: 0.50, gate: 0.42 },
];
let songPartIdx     = 1; // start at 'build' so melody is immediately audible
let songPartMeasure = 0;

function applyBassMode(mode) {
  if (mode === currentBassMode) return;
  currentBassMode = mode;
  const R = 0.4; // ramp time in seconds (smooth transition, no clicks)
  switch (mode) {
    case 'echo':
      // Dub-style delay — wide open filter so echoes ring out clearly
      bassDelay.wet.rampTo(0.72, R);   bassDistort.wet.rampTo(0, R);
      bassChorus.wet.rampTo(0, R);     bFilt.frequency.rampTo(900, R); break;
    case 'distort':
      // Heavy fuzz — full distortion with a touch of delay for grit; wide-open filter
      bassDelay.wet.rampTo(0.22, R);   bassDistort.wet.rampTo(0.98, R);
      bassChorus.wet.rampTo(0, R);     bFilt.frequency.rampTo(2600, R); break;
    case 'clean':
      // Tight and dry — moderate filter, no fx
      bassDelay.wet.rampTo(0, R);      bassDistort.wet.rampTo(0, R);
      bassChorus.wet.rampTo(0, R);     bFilt.frequency.rampTo(800, R); break;
    case 'sparkle':
      // Wide chorus shimmer — filter fully open so chorus effect is bright
      bassDelay.wet.rampTo(0.18, R);   bassDistort.wet.rampTo(0, R);
      bassChorus.wet.rampTo(0.9, R);   bFilt.frequency.rampTo(3000, R); break;
  }
}

function updateBassMode(t, domHue, avgSat) {
  // Primary colors (saturated reds, yellows, greens, blues) → sparkle
  const isPrimary = avgSat > 0.55 && (
    domHue < 40 || domHue > 330 ||
    (domHue > 50  && domHue < 80) ||
    (domHue > 100 && domHue < 160) ||
    (domHue > 210 && domHue < 260)
  );
  if (isPrimary)  { applyBassMode('sparkle'); return; }
  if (t < 0.33)    applyBassMode('echo');
  else if (t < 0.66) applyBassMode('distort');
  else             applyBassMode('clean');
}

function setGenre(name) {
  const p = GENRE_PRESETS[name];
  if (!p || !melody) return;

  const prevGenre = currentGenre;
  currentGenre = name;

  const R = 3.5; // crossfade duration in seconds

  // Release held chords — they tail off through their natural release envelope + reverb.
  melody.releaseAll();
  organ.releaseAll();

  // Set oscillator type for new notes.
  const melOsc  = typeof p.melodyOsc === 'string' ? { type: p.melodyOsc } : p.melodyOsc;
  const bassOsc = typeof p.bassOsc   === 'string' ? { type: p.bassOsc   } : p.bassOsc;
  bass.set({ oscillator: bassOsc, envelope: p.bassEnv });

  // ── Seed new genre's sustained notes immediately with a forced-slow attack ─
  // Only when actually changing genre (not on init or re-clicking the same genre).
  // The slow attack ensures new notes are in sustain phase by the time they're
  // audible; the sustain loop restores the real envelope on its next fire.
  const SEED_ATTACK = 1.5;
  melody.set({ oscillator: melOsc, envelope: { ...p.melodyEnv, attack: SEED_ATTACK } });

  if (name !== prevGenre && Tone.Transport.state === 'started') {
    const now = Tone.now();
    if (name === 'techno') {
      S.arpNotes.slice(0, 3).forEach((note, i) => {
        const high = note.replace(/\d+$/, oct => String(+oct + 2));
        melody.triggerAttack(high, now + i * 0.04, 0.55);
      });
    } else if (name === 'orchestral') {
      S.arpNotes.slice(0, 3).forEach((note, i) => {
        const str = note.replace(/\d+$/, oct => String(+oct + 1));
        melody.triggerAttack(str, now + i * 0.06, 0.52);
      });
    } else if (name === 'choir') {
      S.arpNotes.slice(0, 3).forEach((note, i) => {
        melody.triggerAttack(note, now + i * 0.08, 0.50);
      });
      S.arpNotes.forEach((note, i) => {
        organ.triggerAttackRelease(note, '2m', now + i * 0.05, 0.45);
      });
    }
    // Restore the real envelope after the seed attack has completed
    setTimeout(() => {
      if (currentGenre === name) melody.set({ envelope: p.melodyEnv });
    }, SEED_ATTACK * 1000 + 200);
  } else {
    // Init call: apply real envelope immediately (no seed, no crossfade)
    melody.set({ envelope: p.melodyEnv });
  }

  // Effects crossfade over R seconds.
  reverb.wet.rampTo(p.reverbWet, R);
  ppDelay.wet.rampTo(p.ppWet, R);
  melodyChorus.wet.rampTo(p.chorusWet, R);
  hallReverb.wet.rampTo(p.hallWet, R);
  ambientAutoFilter.wet.rampTo(p.autoFilterWet, R);
  technoPhaser.wet.rampTo(p.phaserWet, R);
  drumBus.wet.rampTo(name === 'techno' ? 0.75 : 0, R);
  melodyVibrato.wet.rampTo(p.vibratoWet, R);
  melodyVibrato.depth.rampTo(p.vibratoDepth, R);
  melodyVibrato.frequency.value = p.vibratoFreq;

  // All volumes ramp simultaneously — old genre fades out, new fades in.
  [
    ['mxMelody', 'vMelody', melody,  p.vol.melody],
    ['mxBass',   'vBass',   bass,    p.vol.bass],
    ['mxKick',   'vKick',   kick,    p.vol.kick],
    ['mxSnare',  'vSnare',  snare,   p.vol.snare],
    ['mxHihat',  'vHihat',  hihat,   p.vol.hihat],
  ].forEach(([sid, vid, inst, db]) => {
    inst.volume.rampTo(db, R);
    const s = document.getElementById(sid);
    const v = document.getElementById(vid);
    if (s) s.value = db;
    if (v) v.textContent = db;
  });
  organ.volume.rampTo(p.vol.organ, R);
  woodwind.volume.rampTo(p.vol.woodwind, R);
  ambientPad.volume.rampTo(p.vol.ambientPad, R);
  ambientBassNote.volume.rampTo(p.vol.ambientBassNote, R);
  ambientSparkle.volume.rampTo(p.vol.ambientSparkle, R);

  // Seed ambient pad so it doesn't wait up to one bar for the sustain loop.
  if (name === 'ambient' && Tone.Transport.state === 'started') {
    Tone.Transport.scheduleOnce((time) => {
      ambientPad.releaseAll(time);
      S.arpNotes.forEach((note, i) => {
        ambientPad.triggerAttack(note, time + i * 0.12, Math.max(0.65 - i * 0.1, 0.28));
      });
    }, '+0.5');
  }
}

async function initAudio() {
  await Tone.start();

  // Master chain: reverb + hall reverb -> compressor -> limiter -> out
  // Compressor with makeup gain brings up quiet ambient/choir layers
  // while the limiter prevents clipping.
  reverb = new Tone.Reverb({ decay: 2.5, wet: 0.28 });
  await reverb.generate();
  hallReverb = new Tone.Reverb({ decay: 2.5, wet: 0 });
  await hallReverb.generate();
  const limiter = new Tone.Limiter(-1).toDestination();
  masterComp = new Tone.Compressor({
    threshold: -22, ratio: 4, attack: 0.008, release: 0.22, knee: 8,
  }).connect(limiter);
  reverb.connect(masterComp);
  hallReverb.connect(masterComp);
  // Dry anchor for ambientPad: bypasses reverb smearing, provides presence
  ambientDryGain = new Tone.Gain({ gain: 0.28 }).connect(masterComp);
  // Drum bus: hard-clip Distortion gives NES-style crunch in techno; wet=0 in other genres
  drumBus = new Tone.Distortion({ distortion: 0.92, oversample: '4x', wet: 0 });
  drumBus.connect(reverb);
  drumBus.connect(masterComp);

  // Ping-pong delay on melody for stereo movement
  ppDelay = new Tone.PingPongDelay({ delayTime: '8n', feedback: 0.22, wet: 0.28 }).connect(reverb);

  // Chorus on melody (starts dry; genres activate it)
  melodyChorus = new Tone.Chorus({ frequency: 3, delayTime: 3.5, depth: 0.6, wet: 0 }).start().connect(ppDelay);

  // Vibrato on melody (starts dry; choir/strings activate it for natural pitch wavering)
  melodyVibrato = new Tone.Vibrato({ frequency: 5, depth: 0.04, wet: 0 }).connect(melodyChorus);

  // Melody: soft triangle waves, generous release
  // Chain: melody → vibrato → chorus → ppDelay → reverb; also feeds hallReverb
  melody = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 4,
    oscillator: { type: 'triangle' },
    envelope: { attack: 0.05, decay: 0.3, sustain: 0.1, release: 1.5 },
    volume: -12,
  }).connect(melodyVibrato).connect(hallReverb);

  // Bass: sawtooth → delay → distort → phaser → chorus → filter → reverb
  bFilt       = new Tone.Filter({ frequency: 550, type: 'lowpass', rolloff: -24 }).connect(reverb);
  bassChorus  = new Tone.Chorus({ frequency: 4, delayTime: 2.5, depth: 0.7, wet: 0 }).start().connect(bFilt);
  technoPhaser = new Tone.Phaser({ frequency: 2, octaves: 4, baseFrequency: 300, wet: 0 }).connect(bassChorus);
  bassDistort = new Tone.Distortion({ distortion: 0.90, wet: 0 }).connect(technoPhaser);
  bassDelay   = new Tone.FeedbackDelay({ delayTime: '8n', feedback: 0.45, wet: 0 }).connect(bassDistort);
  bass = new Tone.Synth({
    oscillator: { type: 'sawtooth' },
    envelope: { attack: 0.01, decay: 0.2, sustain: 0.45, release: 0.5 },
    volume: -10,
  }).connect(bassDelay);

  // Kick drum
  kick = new Tone.MembraneSynth({
    pitchDecay: 0.08, octaves: 7,
    envelope: { attack: 0.001, decay: 0.32, sustain: 0, release: 0.1 },
    volume: -5,
  }).connect(drumBus);

  // Metallic hi-hat
  hihat = new Tone.MetalSynth({
    frequency: 500, harmonicity: 5.1, modulationIndex: 32,
    resonance: 4000, octaves: 1.5,
    envelope: { attack: 0.001, decay: 0.08, release: 0.01 },
    volume: -12,
  }).connect(drumBus);

  // Noise snare
  snare = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.14, sustain: 0, release: 0.05 },
    volume: -14,
  }).connect(drumBus);

  // ── Genre-specific instruments (all start silent) ────────────────────────

  // Organ: sustained drawbar-like chords for choir mode.
  // fatsquare uses multiple detuned square waves → thick, organlike harmonics.
  organ = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 8,
    oscillator: { type: 'fatsquare', spread: 22, count: 3 },
    envelope:   { attack: 0.06, decay: 0, sustain: 1.0, release: 0.5 },
    volume: -36,
  }).connect(reverb).connect(hallReverb);

  // Woodwind: flute/piccolo countermelody for orchestral mode.
  // fatsine with narrow spread sounds breathy and flute-like.
  woodwind = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 3,
    oscillator: { type: 'fatsine', spread: 6, count: 2 },
    envelope:   { attack: 0.05, decay: 0.18, sustain: 0.32, release: 1.4 },
    volume: -36,
  }).connect(ppDelay);

  // Ambient pad: triangle waves bloom through autoFilter → tremolo.
  // fattriangle gives richer harmonics than fatsine — much more perceived loudness
  // at the same dB level. Tremolo depth trimmed to 0.25 so the pad never dips
  // low enough to disappear. ambientDryGain provides a parallel direct path to
  // the master compressor, anchoring the sound in presence while reverb adds wash.
  ambientTremolo = new Tone.Tremolo({ frequency: 0.75, depth: 0.25, spread: 180, wet: 0.65 })
    .start().connect(reverb).connect(ambientDryGain);
  ambientAutoFilter = new Tone.AutoFilter({
    frequency: 0.15, baseFrequency: 400, octaves: 2.2, wet: 0,
  }).start().connect(ambientTremolo);
  ambientPad = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 8,
    oscillator: { type: 'fattriangle', spread: 22, count: 3 },
    envelope:   { attack: 0.7, decay: 0.5, sustain: 0.85, release: 4.5 },
    volume: -36,
  }).connect(ambientAutoFilter);

  // Ambient sparse bass — occasional deep root notes with long decay
  ambientBassNote = new Tone.Synth({
    oscillator: { type: 'sine' },
    envelope:   { attack: 0.8, decay: 0.6, sustain: 0.6, release: 5.0 },
    volume: -36,
  }).connect(reverb);

  // Ambient sparkle — polyphonic bell-like plucks triggered by bright image cells
  ambientSparkle = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 6,
    oscillator: { type: 'triangle' },
    envelope:   { attack: 0.005, decay: 0.45, sustain: 0.0, release: 2.8 },
    volume: -36,
  }).connect(reverb);
}

// ── SEQUENCER ────────────────────────────────────────────────────────────────
// Two separate loops on a fixed 100 BPM transport:
//
//  DRUM LOOP ('16n') — always fires; no motion or brightness conditions on timing.
//    Kick:  every quarter beat (steps 0,4,8,12) + extra hits on bright image strips
//    Snare: beats 2 & 4 (steps 4, 12) always
//    Hi-hat: every 8th note (even steps) always; strip brightness shapes velocity
//    Strip brightness of each step's horizontal band modulates velocity for all drums,
//    so the spatial image pattern is always imprinted on the groove.
//
//  MELODY/BASS LOOP ('8n') — also always fires, but an internal subdivision counter
//    gates when notes actually play. The subdivision is derived from brightness:
//      bright (>75%)  → fires every 8th note  (2× the quarter pulse)
//      medium (45-75%)→ fires every quarter    (1× the quarter pulse)
//      dim (20-45%)   → fires every half note  (½×)
//      dark (<20%)    → fires every whole note (¼×)
//    This keeps melody always an integer multiple of the drum pulse → always in sync.
//    Bass plays unconditionally on every melody fire; melody notes are motion-gated.
function startSequencer() {
  Tone.Transport.bpm.value = S.bpm; // initial value; analyzeFrame() updates it each frame

  // ── Drum loop ──────────────────────────────────────────────────────────────
  let drumStep = 0;

  Tone.Transport.scheduleRepeat((time) => {
    // Commit pending beat style at the top of each measure
    if (drumStep === 0 && S.pendingBeatStyle) {
      S.beatStyle        = S.pendingBeatStyle;
      S.pendingBeatStyle = null;
    }
    // Advance song part at measure boundaries
    if (drumStep === 0) {
      songPartMeasure++;
      if (songPartMeasure >= SONG_PARTS[songPartIdx].measures) {
        songPartMeasure = 0;
        songPartIdx = (songPartIdx + 1) % SONG_PARTS.length;
      }
    }

    seqStep = drumStep;
    const sp        = SONG_PARTS[songPartIdx];
    const normStrip = (S.stripBright[drumStep] - S.stripMean) / (S.stripStd || 1);
    const motBoost  = Math.min(S.totalMotion / 60, 0.3);
    const t = Math.max(0, Math.min(1, (S.bpm - BPM_LO) / (BPM_HI - BPM_LO)));
    const isAccent  = drumStep % 4 === 0;
    const dimFactor = 0.5 + 0.5 * Math.min(S.overallBright / 128, 1.0);

    // ── Orchestral mode: woodwind countermelody replaces drums ─────────────────
    if (currentGenre === 'orchestral') {
      if (isAccent && S.stripBright[drumStep] > S.stripMean * 0.75) {
        const scale   = SCALES[S.scaleName];
        const noteIdx = Math.min(5 + ((drumStep / 4 | 0) % 2), scale.length - 1);
        woodwind.triggerAttackRelease(scale[noteIdx], '8n', time,
          Math.min(0.28 + S.totalMotion / 80, 0.58) * dimFactor * sp.vel);
      } else if (normStrip > 0.75 && drumStep % 2 === 1 && t > 0.35) {
        const scale   = SCALES[S.scaleName];
        const noteIdx = Math.min(4 + (drumStep % 3), scale.length - 1);
        woodwind.triggerAttackRelease(scale[noteIdx], '16n', time, 0.16 * dimFactor * sp.vel);
      }
      drumStep = (drumStep + 1) % STEPS;
      return;
    }

    // ── Ambient mode: no percussion at all ─────────────────────────────────────
    if (currentGenre === 'ambient') {
      drumStep = (drumStep + 1) % STEPS;
      return;
    }

    const pattern = BEAT_PATTERNS[S.beatStyle] || BEAT_PATTERNS.standard;

    // Kick ─────────────────────────────────────────────────────────────────────
    if (pattern.kick.includes(drumStep)) {
      const vel = isAccent
        ? Math.min(0.65 + motBoost, 1.0)
        : Math.min(0.35 + t * 0.3 + motBoost, 0.85);
      kick.triggerAttackRelease('C1', '16n', time, vel * dimFactor * sp.vel);
    } else if (normStrip > 0.6 && t > 0.3 && sp.gate > 0.5) {
      // Image-pattern syncopation: bright strips add ghost kicks at mid-high BPM
      kick.triggerAttackRelease('C1', '16n', time, Math.min(0.22 + normStrip * 0.08, 0.48) * dimFactor * sp.vel);
    }

    // Snare ───────────────────────────────────────────────────────────────────
    if (pattern.snare.includes(drumStep)) {
      snare.triggerAttackRelease('16n', time, Math.min(0.45 + t * 0.3 + motBoost, 0.9) * dimFactor * sp.vel);
    }

    // Hi-hat ──────────────────────────────────────────────────────────────────
    // In intro/break, thin out hi-hats to every other hit
    if (pattern.hat.includes(drumStep) && (sp.gate > 0.5 || drumStep % 4 === 2)) {
      const baseVel = 0.2 + Math.min(Math.max(normStrip + 1, 0) * 0.1, 0.28);
      hihat.triggerAttackRelease('32n', time, Math.min(baseVel + motBoost * 0.5, 0.72) * dimFactor * sp.vel);
    }

    // Drum fill — triggered by a sudden brightness burst in analyzeFrame
    if (S.triggerFill) {
      S.triggerFill = false;
      const t32 = Tone.Time('32n').toSeconds();
      for (let i = 0; i < 6; i++) {
        snare.triggerAttackRelease('32n', time + i * t32, Math.min(0.5 + i * 0.07, 0.92));
      }
      hihat.triggerAttackRelease('8n', time + 6 * t32, 0.95);
    }

    drumStep = (drumStep + 1) % STEPS;
  }, '16n');

  // ── Bass arpeggio loop ('16n') ─────────────────────────────────────────────
  // Uses rotating 16-step rhythm patterns (BASS_RHYTHMS) to decide when notes
  // fire, rather than a fixed chordDiv. The chord-note sequence (ARP_PATTERNS)
  // advances only on active rhythm steps, so the groove changes while the
  // harmonic content stays locked to the image. Pattern rotates every 4 bars.
  let arpChordIdx = 0;
  let arpFine16   = 0;

  Tone.Transport.scheduleRepeat((time) => {
    const sp     = SONG_PARTS[songPartIdx];
    const step16 = arpFine16 % 16;
    const t      = Math.max(0, Math.min(1, (S.bpm - BPM_LO) / (BPM_HI - BPM_LO)));

    // ── Choir / Orchestral: bass follows the harmony, not the groove ───────────
    // Plays one long note per measure from the chord tones, cycling root → fifth →
    // root → third. This shadows the main instrument harmonically rather than
    // driving an independent rhythm underneath it.
    if (currentGenre === 'choir' || currentGenre === 'orchestral') {
      if (step16 === 0) {
        const measureIdx = Math.floor(arpFine16 / 16);
        // root → fifth → root → third cycle (indices into arpNotes)
        const seqMap  = [0, 2, 0, 1];
        const noteIdx = seqMap[measureIdx % 4] % S.arpNotes.length;
        const vel     = Math.min(0.35 + S.totalMotion / 180, 0.70) * sp.vel;
        bass.triggerAttackRelease(S.arpNotes[noteIdx], '1m', time, vel);
      }
      arpFine16 = (arpFine16 + 1) % 64;
      return;
    }

    // ── Techno / Ambient: rotate 16-step rhythm patterns every 4 bars ──────────
    if (arpFine16 === 0) {
      bassRhythmBar++;
      if (bassRhythmBar % 4 === 0) {
        let next;
        do { next = Math.floor(Math.random() * BASS_RHYTHMS.length); }
        while (next === bassRhythmIdx && BASS_RHYTHMS.length > 1);
        bassRhythmIdx = next;
      }
    }

    const rhythm = BASS_RHYTHMS[bassRhythmIdx];

    if (rhythm[step16]) {
      const isStrong = (step16 % 4 === 0);
      let note;

      // Strong beats always land on chord tones.
      // Weak beats: 60% chord tone, 40% low-register scale tone for melodic variety.
      if (isStrong || Math.random() < 0.60) {
        const pattern = ARP_PATTERNS[S.arpPatternIdx];
        const noteIdx = pattern[arpChordIdx % pattern.length] % S.arpNotes.length;
        note = S.arpNotes[noteIdx];
        arpChordIdx++;
      } else {
        // Scale walk: pick from the bottom 3 scale tones (stays in bass register)
        const scale = SCALES[S.scaleName];
        note = scale[Math.floor(Math.random() * 3)];
        // don't advance arpChordIdx — resume chord sequence on next hit
      }

      // Occasional octave jump up for register variety (~10%)
      if (!isStrong && Math.random() < 0.10) {
        note = note.replace(/\d+$/, oct => String(parseInt(oct) + 1));
      }

      // Duration: hold until next active step
      const remaining  = rhythm.slice(step16 + 1);
      const nextOffset = remaining.findIndex(v => v);
      const stepsHeld  = nextOffset >= 0 ? nextOffset + 1 : rhythm.length - step16;
      const dur        = stepsHeld <= 1 ? '16n' : stepsHeld <= 2 ? '8n' : '4n';

      const colIdx = step16 % GRID;
      // Ghost notes: soft hits on weak beats for rhythmic texture (~18%)
      const isGhost = (!isStrong && Math.random() < 0.18);
      const vel = isGhost
        ? (0.10 + Math.random() * 0.12) * sp.vel
        : Math.min(0.32 + t * 0.48 + S.cellMotion[3 * GRID + colIdx] / 150, 0.95) * sp.vel;
      bass.triggerAttackRelease(note, dur, time, vel);

    } else if (rhythm[step16 + 1] && t > 0.3 && sp.gate > 0.4 && Math.random() < 0.32) {
      // ── Chromatic approach note just before the next active step ────────
      const pattern     = ARP_PATTERNS[S.arpPatternIdx];
      const nextNoteIdx = pattern[arpChordIdx % pattern.length] % S.arpNotes.length;
      const passNote    = semitoneLower(S.arpNotes[nextNoteIdx]);
      bass.triggerAttackRelease(passNote, '32n', time, 0.24 * sp.vel);
    }

    arpFine16 = (arpFine16 + 1) % 64;
  }, '16n');

  // ── Melody loop ('8n') ────────────────────────────────────────────────────
  // Motion-gated scale notes from the upper 3 grid rows.
  // Firing rate adapts to brightness via mSubdiv (same as before).
  let m8Step = 0;
  let mSubdiv = 2;

  Tone.Transport.scheduleRepeat((time) => {
    const stepNow = m8Step;
    const col     = stepNow % GRID;
    const fires   = (stepNow % mSubdiv === 0);
    m8Step        = (m8Step + 1) % 64;

    const bright = S.overallBright / 255;
    mSubdiv    = bright > 0.75 ? 1 : bright > 0.45 ? 2 : bright > 0.2 ? 4 : 8;
    melodyNote = ['8n', '4n', '2n', '1n'][[1,2,4,8].indexOf(mSubdiv)];

    // Techno: chord sustain loop drives the melody instrument; skip per-note firing
    if (currentGenre === 'techno') return;

    if (!fires) return;

    const scale     = SCALES[S.scaleName];
    const adaptGate = Math.max(3, M_GATE * (S.overallBright / 128));
    const noteLen   = melodyNote;
    // When the scene is essentially static, derive notes from brightness instead of
    // motion so melody is always audible — the image's tonal pattern drives pitch.
    const isStatic = S.totalMotion < 4;

    for (let row = 0; row < 3; row++) {
      const ci  = row * GRID + col;
      const mot = S.cellMotion[ci];
      const br  = S.cellBright[ci];

      const sp = SONG_PARTS[songPartIdx];
      let shouldPlay, vel;
      // Orchestral woodwind fires more freely than other genres
      const isOrch   = currentGenre === 'orchestral';
      const gateBase = isOrch ? 0.68 : 0.42;

      if (isStatic) {
        if (br < 40) continue;
        const densityBoost = 0.65 + S.texComplexity * 0.35;
        if (Math.random() > gateBase * (br / 200) * densityBoost * sp.gate) continue;
        shouldPlay = true;
        vel = Math.min(0.28 + (br / 255) * 0.32, 0.65) * sp.vel;
      } else {
        if (mot < adaptGate * 0.6) continue;
        if (Math.random() > Math.min(mot / (adaptGate * 3.5), 0.82) * sp.gate) continue;
        shouldPlay = true;
        vel = Math.min(0.28 + mot / 110, 0.82) * sp.vel;
      }

      if (!shouldPlay) continue;
      const registerShift = S.texFine > 0.5 ? 1 : 0;
      const base    = (2 - row) * 2 + 2 + registerShift;
      const noteIdx = Math.min(base + ((br / 255) * 1.9 | 0), scale.length - 1);
      // Orchestral: woodwind carries the melodic line above the sustained string chords
      const melInst = isOrch ? woodwind : melody;
      const durLen  = isOrch ? '4n' : noteLen;
      melInst.triggerAttackRelease(scale[noteIdx], durLen, time, vel);

      // Choir: also fire woodwind as a high soprano counter-voice (~40% of notes)
      if (currentGenre === 'choir' && Math.random() < 0.40) {
        const sopranoIdx = Math.min(noteIdx + 1, scale.length - 1);
        woodwind.triggerAttackRelease(scale[sopranoIdx], noteLen, time + 0.03, vel * 0.7);
      }
    }
  }, '8n');

  // ── Chord sustain loop ('2n') ─────────────────────────────────────────────
  // Retriggers organ (choir) or ambient pad on chord changes + as periodic refresh.
  // For ambient pad: triggerAttack sustains indefinitely; tremolo provides the pulse.
  let sustainChordName = '';
  let sustainTick      = 0;

  Tone.Transport.scheduleRepeat((time) => {
    sustainTick++;
    const chordChanged = S.chordName !== sustainChordName;

    // Techno: sustained chord pad, shifts arpNotes up 2 octaves into melody register.
    // Retriggers every 4 bars (8 × '2n') or on chord change.
    if (currentGenre === 'techno' && (chordChanged || sustainTick % 8 === 0)) {
      sustainChordName = S.chordName;
      melody.releaseAll(time);
      S.arpNotes.slice(0, 3).forEach((note, i) => {
        // Shift up 2 octaves: 'C2' → 'C4', 'G2' → 'G4', etc.
        const highNote = note.replace(/\d+$/, oct => String(parseInt(oct) + 2));
        melody.triggerAttack(highNote, time + i * 0.03,
          Math.max(0.58 - i * 0.12, 0.25));
      });
    }

    if (currentGenre === 'choir' && (chordChanged || sustainTick % 8 === 0)) {
      sustainChordName = S.chordName;
      organ.releaseAll(time);
      S.arpNotes.forEach((note, i) => {
        organ.triggerAttackRelease(note, '2m', time + i * 0.04,
          Math.max(0.55 - i * 0.08, 0.22));
      });
    }

    // Orchestral: strings hold chord, retrigger every 2 bars or chord change
    if (currentGenre === 'orchestral' && (chordChanged || sustainTick % 4 === 0)) {
      sustainChordName = S.chordName;
      melody.releaseAll(time);
      S.arpNotes.slice(0, 3).forEach((note, i) => {
        const strNote = note.replace(/\d+$/, oct => String(parseInt(oct) + 1));
        melody.triggerAttack(strNote, time + i * 0.06, Math.max(0.52 - i * 0.1, 0.24));
      });
    }

    if (currentGenre === 'ambient' && (chordChanged || sustainTick % 2 === 0)) {
      sustainChordName = S.chordName;
      ambientPad.releaseAll(time);
      // Stagger note onsets for a wash-in rather than a simultaneous attack
      S.arpNotes.forEach((note, i) => {
        ambientPad.triggerAttack(note, time + i * 0.12,
          Math.max(0.7 - i * 0.1, 0.28));
      });
    }

    // Ambient organ: slow harmonic chord layer, retriggers every 4 bars
    if (currentGenre === 'ambient' && (chordChanged || sustainTick % 8 === 0)) {
      organ.releaseAll(time);
      S.arpNotes.forEach((note, i) => {
        // Shift up 1 octave for mid-register warmth
        const midNote = note.replace(/\d+$/, oct => String(parseInt(oct) + 1));
        organ.triggerAttackRelease(midNote, '2m', time + i * 0.18,
          Math.max(0.45 - i * 0.07, 0.18));
      });
    }

    // Sync tremolo rate to half-note pulse so pulsation locks to BPM
    if (ambientTremolo) {
      ambientTremolo.frequency.value = (S.bpm / 60) * 0.5;
    }
  }, '2n');

  // ── Ambient sparse bass notes ('1m') ─────────────────────────────────────
  let ambMeasure = 0;
  Tone.Transport.scheduleRepeat((time) => {
    if (currentGenre !== 'ambient') return;
    ambMeasure++;
    const sp    = SONG_PARTS[songPartIdx];
    const scale = SCALES[S.scaleName];
    // Sparse deep root note every 2–4 measures
    const bassPeriod = sp.gate > 0.8 ? 2 : sp.gate > 0.5 ? 3 : 4;
    if (ambMeasure % bassPeriod === 0) {
      const noteIdx = Math.floor(Math.random() * 2);
      ambientBassNote.triggerAttackRelease(scale[noteIdx], '2n', time,
        (0.3 + Math.random() * 0.25) * sp.vel);
    }
  }, '1m');

  // ── Ambient sparkle: triggered by bright image cells ('4n') ──────────────
  // Scans all 4 grid rows for bright cells; top rows fire higher-octave notes
  // so the visual brightness map is reflected across a wide pitch range.
  //   row 0 (top)  → +2 octaves: crystal/bell register (C5–C7)
  //   row 1        → +1 octave:  high melody register  (C4–C6)
  //   rows 2–3     → no shift:   mid register           (C3–C5)
  // Notes last '16n' (vs old '32n') so they read more clearly in the mix.
  Tone.Transport.scheduleRepeat((time) => {
    if (currentGenre !== 'ambient') return;
    const sp    = SONG_PARTS[songPartIdx];
    const scale = SCALES[S.scaleName];
    const t16   = Tone.Time('16n').toSeconds();
    let offset   = 0;
    let firedAny = false;
    let noteCount = 0;

    for (let row = 0; row < GRID && noteCount < 5; row++) {
      const octShift  = row === 0 ? 2 : row === 1 ? 1 : 0;
      const threshold = 110 + row * 15; // top rows trigger more easily
      for (let col = 0; col < GRID && noteCount < 5; col++) {
        const br = S.cellBright[row * GRID + col];
        if (br < threshold) continue;
        const prob = ((br - threshold) / (255 - threshold)) * sp.gate * 0.7;
        if (Math.random() > prob) continue;
        const noteIdx = Math.min(4 + col + (br > 200 ? 1 : 0), scale.length - 1);
        let note = scale[noteIdx];
        if (octShift > 0) note = note.replace(/\d+$/, n => String(+n + octShift));
        const vel = (0.25 + (br / 255) * 0.55) * sp.vel;
        ambientSparkle.triggerAttackRelease(note, '16n', time + offset, vel);
        offset  += t16 * 0.5;
        firedAny = true;
        noteCount++;
      }
    }

    // Guaranteed minimum: at least one high shimmer so texture is never silent
    if (!firedAny && Math.random() < 0.60) {
      const noteIdx = 4 + Math.floor(Math.random() * (scale.length - 4));
      let note = scale[noteIdx];
      // Bias toward higher register for the minimum sparkle too
      const octUp = Math.random() < 0.6 ? 1 : 0;
      if (octUp) note = note.replace(/\d+$/, n => String(+n + octUp));
      ambientSparkle.triggerAttackRelease(
        note, '16n', time + t16 * Math.floor(Math.random() * 3),
        (0.35 + Math.random() * 0.40) * sp.vel
      );
    }
  }, '4n');

  // Apply the initial genre preset so instruments start at their correct volumes
  // rather than their construction defaults. Must come before Transport.start()
  // so no seed notes are triggered (Transport.state !== 'started' guard).
  setGenre(currentGenre);

  Tone.Transport.start();
}

// ── RENDER LOOP ──────────────────────────────────────────────────────────────
function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let running = false;
let overlayVisible = true;
let firstFramePrimed = false;

const FRAME_MS = 1000 / 30;  // cap to 30 fps — halves rAF/canvas/getImageData work on mobile
let lastFrameTime = 0;
let autoGenreCounter = 0;

function drawLoop(ts = 0) {
  requestAnimationFrame(drawLoop);
  if (!running || ts - lastFrameTime < FRAME_MS) return;
  lastFrameTime = ts;

  lastRawSrc = testMode && testImgReady ? testImgEl : video;

  // Draw video feed with effects first, then analyze post-effect canvas for audio
  applyEffect(lastRawSrc);
  analyzeFrame();

  // Genre detection throttled to every 6 frames (~5×/sec at 30fps) — saves a
  // full getImageData + pixel pass that previously ran 60× per second.
  if (++autoGenreCounter % 6 === 0) updateAutoGenre(lastRawSrc);

  // On the very first frame in auto mode, snap immediately to the best-fit genre
  // rather than waiting for the EMA hysteresis to converge (which would always
  // play techno for the first several bars).
  if (!firstFramePrimed && autoGenreMode) {
    firstFramePrimed = true;
    const initial = computeGenreScores(lastRawSrc);
    for (const g in autoScores) autoScores[g] = initial[g];
    autoCurrentBest = Object.keys(initial).reduce((a, b) => initial[a] >= initial[b] ? a : b);
    setGenre(autoCurrentBest);
    const autoBtn = document.getElementById('autoGenreBtn');
    if (autoBtn) autoBtn.textContent = 'AUTO: ' + autoCurrentBest.toUpperCase();
  }

  const activeRing   = Math.floor(seqStep / GRID);
  const activeSector = seqStep % GRID;

  // Polar overlay: always drawn regardless of overlayVisible.
  // 4 rings × 4 sectors. Draw outer rings first so inner rings
  // render on top when they overlap near the center.
  {
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const maxR = Math.hypot(canvas.width / 2, canvas.height / 2);

    for (let ring = GRID - 1; ring >= 0; ring--) {
      const innerR = (ring / GRID) * maxR;
      const outerR = ((ring + 1) / GRID) * maxR;

      for (let sector = 0; sector < GRID; sector++) {
        const ci   = ring * GRID + sector;
        const mot  = S.cellMotion[ci];
        const hue  = S.cellHue[ci];
        const live = ring === activeRing && sector === activeSector;

        const startAngle = (sector / GRID) * Math.PI * 2 - Math.PI / 2; // 0 at top
        const endAngle   = ((sector + 1) / GRID) * Math.PI * 2 - Math.PI / 2;

        const alpha = live
          ? 0.1 + Math.min(mot / 45, 0.55)
          : Math.min(mot / 65, 0.38);

        ctx.beginPath();
        ctx.arc(cx, cy, outerR, startAngle, endAngle);
        if (innerR > 0) {
          ctx.arc(cx, cy, innerR, endAngle, startAngle, true);
        } else {
          ctx.lineTo(cx, cy);
        }
        ctx.closePath();
        ctx.fillStyle = `hsla(${hue},78%,58%,${alpha})`;
        ctx.fill();
        ctx.strokeStyle = live ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.08)';
        ctx.lineWidth = live ? 1.5 : 0.5;
        ctx.stroke();

        // Motion dot at arc midpoint
        if (mot > M_GATE) {
          const midR     = (innerR + outerR) / 2;
          const midAngle = (startAngle + endAngle) / 2;
          const dotR     = Math.min(mot / 6, (outerR - innerR) * 0.3);
          ctx.beginPath();
          ctx.arc(cx + midR * Math.cos(midAngle), cy + midR * Math.sin(midAngle), dotR, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${hue},100%,78%,0.65)`;
          ctx.fill();
        }
      }
    }
  }

  if (overlayVisible) {
    // HUD text
    document.getElementById('hBpm').textContent    = Math.round(S.bpm);
    document.getElementById('hNote').textContent   = melodyNote;
    document.getElementById('hScale').textContent  = S.chordName;
    document.getElementById('hGenre').textContent  = currentGenre.toUpperCase();
    document.getElementById('hMotion').textContent = Math.round(S.totalMotion);
    document.getElementById('hBeat').textContent   = S.beatStyle;
    document.getElementById('hTex').textContent    = textureLabel();
    document.getElementById('hStep').textContent   = (seqStep + 1) + '/16';
    const sp = SONG_PARTS[songPartIdx];
    document.getElementById('hPart').textContent   = sp.name + ' ' + (songPartMeasure + 1) + '/' + sp.measures;
  }

}

// ── TEST MODE HELPERS ────────────────────────────────────────────────────────
function enableTestMode(files) {
  testImages   = files.map(f => ({ url: URL.createObjectURL(f), name: f.name }));
  testImgIdx   = 0;
  testImgReady = false;
  testImgEl.onload = () => { testImgReady = true; };
  testImgEl.src = testImages[0].url;
  document.getElementById('testFilename').textContent = testImages[0].name;
  document.getElementById('testCounter').textContent  = `1 / ${testImages.length}`;
  testMode = true;

  overlayVisible = true;
  document.getElementById('hud').classList.add('on');
  document.getElementById('mixer').classList.add('on');
  document.getElementById('testPanel').classList.add('on');
  document.getElementById('menuCameraItem').style.display = 'block';
  document.getElementById('menuOverlayItem').textContent = '◼ OVERLAY';
}

function switchToCamera() {
  testMode     = false;
  testImgReady = false;
  overlayVisible = false;
  document.getElementById('hud').classList.remove('on');
  document.getElementById('mixer').classList.remove('on');
  document.getElementById('testPanel').classList.remove('on');
  document.getElementById('menuCameraItem').style.display = 'none';
  document.getElementById('menuOverlayItem').textContent = '◻ OVERLAY';
  autoGenreMode    = true;
  firstFramePrimed = false;
  activeEffect     = 'glitch';
  fxScratch        = null;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('autoGenreBtn').classList.add('active');
  document.getElementById('autoGenreBtn').textContent = 'AUTO';
  document.querySelectorAll('.fx-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.fx-btn[data-fx="glitch"]').classList.add('active');
}

// ── START ────────────────────────────────────────────────────────────────────
let launched = false;
async function launchApp() {
  if (launched) return;
  launched = true;

  const overlay = document.getElementById('startOverlay');
  overlay.querySelector('.echo-sub').textContent = 'INITIALIZING...';

  try {
    await initAudio();
  } catch (e) {
    alert('Audio error: ' + e);
    launched = false;
    overlay.querySelector('.echo-sub').textContent = 'TAP TO BEGIN';
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    video.srcObject = stream;
    await new Promise(res => video.addEventListener('loadedmetadata', res, { once: true }));
  } catch (e) {
    alert('Camera error: ' + e);
    launched = false;
    overlay.querySelector('.echo-sub').textContent = 'TAP TO BEGIN';
    return;
  }

  overlay.style.display = 'none';
  document.getElementById('menuBtn').classList.add('on');

  // Live camera defaults: auto genre, glitch, overlay hidden
  autoGenreMode  = true;
  activeEffect   = 'glitch';
  overlayVisible = false;
  fxScratch      = null;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('autoGenreBtn').classList.add('active');
  document.querySelectorAll('.fx-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.fx-btn[data-fx="glitch"]').classList.add('active');

  // ── Mixer wiring ───────────────────────────────────────────────────────────
  document.getElementById('mixerToggle').addEventListener('click', () => {
    document.getElementById('mixerBody').classList.toggle('collapsed');
  });
  [
    ['mxMelody', 'vMelody', () => melody.volume],
    ['mxBass',   'vBass',   () => bass.volume],
    ['mxKick',   'vKick',   () => kick.volume],
    ['mxSnare',  'vSnare',  () => snare.volume],
    ['mxHihat',  'vHihat',  () => hihat.volume],
  ].forEach(([sliderId, valId, getVol]) => {
    const slider = document.getElementById(sliderId);
    const label  = document.getElementById(valId);
    slider.addEventListener('input', () => {
      const db = parseInt(slider.value, 10);
      getVol().value = db;
      label.textContent = db;
    });
  });

  // ── Test panel wiring ──────────────────────────────────────────────────────
  document.getElementById('testToggle').addEventListener('click', () => {
    document.getElementById('testBody').classList.toggle('collapsed');
  });
  document.getElementById('testPrev').addEventListener('click', () => {
    loadTestImage(testImgIdx - 1);
  });
  document.getElementById('testNext').addEventListener('click', () => {
    loadTestImage(testImgIdx + 1);
  });
  const autoCb = document.getElementById('testAuto');
  autoCb.addEventListener('change', () => {
    autoCb.checked ? startTestCycle() : stopTestCycle();
  });
  document.getElementById('testDwell').addEventListener('change', () => {
    if (autoCb.checked) startTestCycle(); // restart with updated interval
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  loadTestImage(testImgIdx - 1);
    if (e.key === 'ArrowRight') loadTestImage(testImgIdx + 1);
  });

  document.querySelectorAll('.genre-btn[data-genre]').forEach(btn => {
    btn.addEventListener('click', () => {
      // Disable auto mode when user manually picks a genre
      autoGenreMode = false;
      autoPendingSwitch = null;
      document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      setGenre(btn.dataset.genre);
    });
  });

  document.getElementById('autoGenreBtn').addEventListener('click', () => {
    autoGenreMode = !autoGenreMode;
    const btn = document.getElementById('autoGenreBtn');
    if (autoGenreMode) {
      document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      autoDwellBars = 0;
      autoPendingSwitch = null;
      // Prime scores immediately from the current image so EMA starts at the right values
      if (lastRawSrc) {
        const primed = computeGenreScores(lastRawSrc);
        for (const g in autoScores) autoScores[g] = primed[g];
        autoCurrentBest = Object.keys(autoScores).reduce((a, b) => autoScores[a] >= autoScores[b] ? a : b);
        setGenre(autoCurrentBest);
      } else {
        for (const g in autoScores) autoScores[g] = 0.25;
      }
      btn.textContent = 'AUTO: ' + autoCurrentBest.toUpperCase();
    } else {
      btn.classList.remove('active');
      btn.textContent = 'AUTO';
    }
  });

  document.querySelectorAll('.fx-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fx-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeEffect = btn.dataset.fx;
      // glitch needs a fresh scratch buffer each time it's selected
      if (activeEffect !== 'pixel') fxScratch = null;
    });
  });

  document.getElementById('menuOverlayItem').addEventListener('click', () => {
    document.getElementById('menuPanel').classList.remove('open');
    overlayVisible = !overlayVisible;
    const hud   = document.getElementById('hud');
    const mixer = document.getElementById('mixer');
    const btn   = document.getElementById('menuOverlayItem');
    if (overlayVisible) {
      hud.classList.add('on');
      mixer.classList.add('on');
      btn.textContent = '◼ OVERLAY';
    } else {
      hud.classList.remove('on');
      mixer.classList.remove('on');
      btn.textContent = '◻ OVERLAY';
    }
  });

  running = true;

  // Prime S with the current image before sequencer starts,
  // so the first notes aren't always the same default chord.
  const primeSrc = testMode && testImgReady ? testImgEl : null;
  if (primeSrc) {
    ctx.drawImage(primeSrc, 0, 0, canvas.width, canvas.height);
    analyzeFrame();
  }

  // Live camera: auto-enable genre detection, glitch effect, and hide overlay
  if (!testMode) {
    autoGenreMode    = true;
    activeEffect     = 'glitch';
    overlayVisible   = false;
    fxScratch        = null;
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('autoGenreBtn').classList.add('active');
    document.querySelectorAll('.fx-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.fx-btn[data-fx="glitch"]').classList.add('active');
    document.getElementById('hud').classList.remove('on');
    document.getElementById('mixer').classList.remove('on');
  }

  // On iOS, getUserMedia changes the audio session category which can suspend the
  // AudioContext even after it was successfully resumed in the tap handler.
  // Re-resume here before starting the sequencer. iOS 15+ allows resume without
  // a new gesture if the context was previously user-unlocked in the same session.
  await Tone.start();

  startSequencer();
  drawLoop();
}

// Start overlay tap → launch with live camera.
// Tone.start() must be the very first await in a direct gesture handler on iOS —
// the user-gesture context does not reliably propagate through nested async calls.
document.getElementById('startOverlay').addEventListener('click', async () => {
  await Tone.start();
  testMode = false;
  launchApp();
});

// Hamburger menu toggle
document.getElementById('menuBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('menuPanel').classList.toggle('open');
});

// Close menu when tapping anywhere else
document.addEventListener('click', () => {
  document.getElementById('menuPanel').classList.remove('open');
});

const testFileInput = document.getElementById('testFileInput');

// Menu: load test images
document.getElementById('menuTestItem').addEventListener('click', () => {
  document.getElementById('menuPanel').classList.remove('open');
  testFileInput.click();
});

// Menu: switch back to live camera
document.getElementById('menuCameraItem').addEventListener('click', () => {
  document.getElementById('menuPanel').classList.remove('open');
  if (launched) switchToCamera();
});

testFileInput.addEventListener('change', async () => {
  await Tone.start();
  const files = Array.from(testFileInput.files).filter(f => f.type.startsWith('image/'));
  if (!files.length) return;
  testImages   = files.map(f => ({ url: URL.createObjectURL(f), name: f.name }));
  testImgReady = false;
  testImgEl.onload = () => { testImgReady = true; };
  testImgEl.src    = testImages[0].url;
  document.getElementById('testFilename').textContent = testImages[0].name;
  document.getElementById('testCounter').textContent  = `1 / ${testImages.length}`;
  testImgIdx = 0;
  testMode   = true;
  if (!launched) {
    launchApp();
  } else {
    // App already running: switch to test mode without full re-init
    overlayVisible = true;
    document.getElementById('hud').classList.add('on');
    document.getElementById('mixer').classList.add('on');
    document.getElementById('testPanel').classList.add('on');
    document.getElementById('menuCameraItem').style.display = 'block';
    document.getElementById('menuOverlayItem').textContent = '◼ OVERLAY';
  }
});

// Pause audio when the page is hidden (screen lock, app switch) so the Web
// Audio graph stops burning CPU/battery in the background.
// Guard: Transport.state === 'stopped' means startSequencer() hasn't run yet
// (launched is set early in launchApp, before audio init completes), so we
// must not call start/pause until the sequencer is actually running.
// On iOS, AudioContext.resume() requires a user gesture, so we only call
// Transport.start() if the context is already running — we can't force-resume
// from a visibility event.
// Tap anywhere on the canvas to re-wake audio if it gets suspended (e.g. after
// screen lock/unlock on iOS where resume from visibilitychange isn't allowed).
document.getElementById('canvas').addEventListener('click', () => {
  if (launched && Tone.context.state !== 'running') Tone.start();
});

document.addEventListener('visibilitychange', () => {
  if (!launched || Tone.Transport.state === 'stopped') return;
  if (document.hidden) {
    Tone.Transport.pause();
  } else {
    if (Tone.context.state === 'running') Tone.Transport.start();
    lastFrameTime = 0;
  }
});
</script>
